<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stock QR System</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #f5f3ef;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --accent: #2d6a4f;
    --accent-light: #e8f5e9;
    --warn: #b5451b;
    --warn-light: #fdf0ec;
    --border: #e2e0db;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--text);
    color: #fff;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header-left h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header-left p {
    font-size: 12px;
    color: #aaa;
    margin-top: 2px;
    font-family: var(--mono);
  }
  .status-badge {
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-badge.loading { background: #333; color: #aaa; }
  .status-badge.ok { background: #1a3d2b; color: #74c99a; }
  .status-badge.err { background: #3d1a1a; color: #e87c7c; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .dot.pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .toolbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .count-info {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: var(--mono);
  }

  main { padding: 24px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .card.low { border-color: #f0c4b4; }

  .card-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .card.low .card-header { background: var(--warn-light); border-color: #f0c4b4; }

  .item-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .item-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .item-cat {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .qr-area {
    padding: 16px;
    display: flex;
    justify-content: center;
    background: #fafafa;
  }
  .qr-area > div { border-radius: 6px; overflow: hidden; }

  .card-footer {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }
  .qty-block { }
  .qty-num {
    font-size: 22px;
    font-weight: 700;
    font-family: var(--mono);
    line-height: 1;
    color: var(--text);
  }
  .qty-unit { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .status-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .pill-ok { background: var(--accent-light); color: var(--accent); }
  .pill-low { background: var(--warn-light); color: var(--warn); }

  .dl-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 0 16px 14px;
    padding: 7px;
    text-align: center;
    font-family: 'Sarabun', sans-serif;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  .dl-btn:hover { background: var(--bg); }

  .skeleton { animation: shimmer 1.5s infinite linear; background: linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%); background-size: 200% 100%; border-radius: 8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  @media print {
    header, .toolbar, .dl-btn { display: none !important; }
    .card { break-inside: avoid; box-shadow: none !important; transform: none !important; }
    main { padding: 8px; }
    .grid { gap: 10px; }
  }
  @media (max-width: 500px) {
    main { padding: 16px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📦 Stock QR System</h1>
    <p>ระบบจัดการสต๊อกของใช้สิ้นเปลือง</p>
  </div>
  <div id="statusBadge" class="status-badge loading">
    <div class="dot pulse"></div>
    <span>กำลังโหลด...</span>
  </div>
</header>

<div class="toolbar">
  <button class="filter-btn active" onclick="setFilter('all',this)">ทั้งหมด</button>
  <button class="filter-btn" onclick="setFilter('low',this)">⚠ ต้องซื้อเพิ่ม</button>
  <button class="filter-btn" onclick="setFilter('ok',this)">✓ เพียงพอ</button>
  <button class="filter-btn" onclick="window.print()">🖨 พิมพ์ QR</button>
  <span class="count-info" id="countInfo">—</span>
</div>

<main>
  <div class="grid" id="grid">
    <!-- skeleton -->
    <div style="height:320px" class="skeleton"></div>
    <div style="height:320px" class="skeleton"></div>
    <div style="height:320px" class="skeleton"></div>
    <div style="height:320px" class="skeleton"></div>
  </div>
</main>

<script>
const API_KEY = 'AIzaSyA46g_8FQERBCruZlsKabHvI8x0611G2ng';
const SHEET_ID = '1LyIDRD9KYqZj5a4TQ-_Mr7K0R5vHf_hu';
const SHEET_NAME = '%E0%B8%AA%E0%B8%95%E0%B9%8A%E0%B8%AD%E0%B8%81%E0%B8%82%E0%B8%AD%E0%B8%87%E0%B9%83%E0%B8%8A%E0%B9%89%E0%B8%AA%E0%B8%B4%E0%B9%89%E0%B8%99%E0%B9%80%E0%B8%9B%E0%B8%A5%E0%B8%B7%E0%B8%AD%E0%B8%87';
const BASE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?usp=sharing`;

let allItems = [];
let currentFilter = 'all';

async function fetchData() {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.values || [];
}

function parseItems(rows) {
  const items = [];
  for (const row of rows) {
    const id = row[0];
    if (!id || isNaN(Number(id))) continue;
    items.push({
      id: Number(id),
      name: row[1] || '',
      cat: row[2] || '',
      qty: Number(row[3]) || 0,
      unit: row[4] || '',
      note: row[5] || '',
    });
  }
  return items;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = currentFilter === 'all' ? allItems
    : currentFilter === 'low' ? allItems.filter(i => i.qty < 5)
    : allItems.filter(i => i.qty >= 5);

  document.getElementById('countInfo').textContent = `${filtered.length} รายการ`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>ไม่มีรายการในหมวดนี้</p></div>`;
    return;
  }

  grid.innerHTML = '';
  filtered.forEach(item => {
    const isLow = item.qty < 5;
    const qrText = `ชื่อ: ${item.name}\nหมวด: ${item.cat}\nจำนวน: ${item.qty} ${item.unit}\nลิงก์: ${BASE_URL}`;

    const card = document.createElement('div');
    card.className = `card${isLow ? ' low' : ''}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="item-id">#${String(item.id).padStart(3,'0')}</div>
        <div class="item-name">${item.name}</div>
        <div class="item-cat">${item.cat}</div>
      </div>
      <div class="qr-area"><div id="qr-${item.id}"></div></div>
      <div class="card-footer">
        <div class="qty-block">
          <div class="qty-num">${item.qty}</div>
          <div class="qty-unit">${item.unit}</div>
        </div>
        <span class="status-pill ${isLow ? 'pill-low' : 'pill-ok'}">${isLow ? '⚠ ต้องซื้อ' : '✓ เพียงพอ'}</span>
      </div>
      <a class="dl-btn" id="dl-${item.id}" href="#" download="QR_${item.name}.png">⬇ ดาวน์โหลด QR</a>
    `;
    grid.appendChild(card);

    // Generate QR
    setTimeout(() => {
      const qrEl = document.getElementById(`qr-${item.id}`);
      if (!qrEl) return;
      new QRCode(qrEl, {
        text: qrText,
        width: 150,
        height: 150,
        colorDark: '#1a1a1a',
        colorLight: '#fafafa',
        correctLevel: QRCode.CorrectLevel.M
      });
      // Setup download
      setTimeout(() => {
        const canvas = qrEl.querySelector('canvas');
        if (canvas) {
          document.getElementById(`dl-${item.id}`).addEventListener('click', (e) => {
            e.preventDefault();
            const a = document.createElement('a');
            a.download = `QR_${item.name}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
          });
        }
      }, 300);
    }, 50);
  });
}

async function init() {
  const badge = document.getElementById('statusBadge');
  try {
    const rows = await fetchData();
    allItems = parseItems(rows);
    badge.className = 'status-badge ok';
    badge.innerHTML = `<div class="dot"></div><span>โหลดแล้ว ${allItems.length} รายการ</span>`;
    renderGrid();
  } catch(e) {
    badge.className = 'status-badge err';
    badge.innerHTML = `<div class="dot"></div><span>โหลดไม่สำเร็จ: ${e.message}</span>`;
    document.getElementById('grid').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>ไม่สามารถโหลดข้อมูลได้<br>กรุณาตรวจสอบ API Key และ Sheet ครับ</p></div>`;
  }
}

init();
</script>
</body>
</html>
